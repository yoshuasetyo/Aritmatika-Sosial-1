<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine Mk 8</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // EDIT THESE TWO LINES FOR EACH NEW QUIZ
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWbwzfxeeX5sjKjegTJdZClFm-feDNT-JUM7Vkw0m9V2BcWA8aFI8l9IOF729wYyY1/exec"; 
        const QUIZ_TITLE = "Aritmatika Sosial v1"; 
        
        // INSERT STUDENT NAMES HERE
        const ALLOWED_STUDENTS = ["13", "Yoshua", "Jevan", "Student", "Giri", "Astrid", "Christie", "Nonik"];

        const shuffle = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.renderMathInElement) {
                    window.renderMathInElement(containerRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <span ref={containerRef}>{text}</span>;
        };

        function App() {
            const [studentName, setStudentName] = useState("");
            const [step, setStep] = useState('loading'); 
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [timings, setTimings] = useState({});
            const [showConfirm, setShowConfirm] = useState(false);
            const [accessDenied, setAccessDenied] = useState(false);
            const questionStartTime = useRef(null);

            useEffect(() => {
                // Validation for missing SCRIPT_URL
                if (!SCRIPT_URL || SCRIPT_URL === "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE") {
                    setStep('no-url');
                    return;
                }

                fetch(SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => {
                        const preparedData = data.map(item => ({
                            ...item,
                            options: shuffle(item.options)
                        }));
                        setQuestions(preparedData);
                        setStep('name');
                    })
                    .catch(() => setStep('error'));
            }, []);

            useEffect(() => {
                if (step === 'quiz') questionStartTime.current = Date.now();
            }, [currentIdx, step]);

            const startQuiz = () => {
                const trimmedName = studentName.trim().toLowerCase();
                const isAllowed = ALLOWED_STUDENTS.some(name => name.toLowerCase() === trimmedName);
                if (!isAllowed) { setAccessDenied(true); return; }
                setStep('quiz');
            };

            const handleAnswer = (option) => {
                const secondsTaken = Math.round((Date.now() - questionStartTime.current) / 1000);
                const qId = questions[currentIdx].id;
                setAnswers(prev => ({ ...prev, [qId]: option }));
                setTimings(prev => ({ ...prev, [qId]: secondsTaken }));
                if (currentIdx < questions.length - 1) {
                    setTimeout(() => setCurrentIdx(prev => prev + 1), 300);
                }
            };

            const handleFinalSubmit = async () => {
                setShowConfirm(false);
                setStep('submitting');
                const payload = {
                    studentName: studentName,
                    results: questions.map(q => ({
                        questionNo: q.id,
                        studentAnswer: answers[q.id],
                        correctAnswer: q.answer,
                        status: answers[q.id] === q.answer ? "Correct" : "Incorrect",
                        secondsTaken: timings[q.id] || 0
                    }))
                };
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setStep('done');
                } catch (e) { setStep('error'); }
            };

            if (step === 'loading') return <div className="flex items-center justify-center min-h-screen text-slate-400 font-sans tracking-widest uppercase text-xs text-center leading-loose p-10">Initializing Engine Mk 8...</div>;
            if (step === 'submitting') return <div className="flex flex-col items-center justify-center min-h-screen font-sans"><div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div><p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Sending Results...</p></div>;
            
            if (step === 'no-url') return (
                <div className="flex items-center justify-center min-h-screen p-6 font-sans">
                    <div className="bg-white p-8 rounded-[2rem] shadow-xl text-center border-b-8 border-amber-500 max-w-sm">
                        <div className="text-amber-500 text-4xl mb-4">⚠️</div>
                        <h2 className="text-slate-800 font-black uppercase text-lg">No Script URL Attached</h2>
                        <p className="text-xs text-slate-400 mt-2 leading-relaxed italic">
                            Missing link detected for this Mk 8 Quiz.
                        </p>
                        <div className="mt-4 p-3 bg-slate-50 rounded-xl text-[10px] text-slate-500 font-mono text-left">
                            Please paste the Google Web App URL into the SCRIPT_URL constant.
                        </div>
                    </div>
                </div>
            );

            if (step === 'error') return <div className="flex items-center justify-center min-h-screen p-6 font-sans"><div className="bg-white p-8 rounded-3xl shadow-xl text-center"><h2 className="text-red-500 font-bold uppercase">Connection Failed</h2><p className="text-xs text-slate-400 mt-2 font-bold uppercase tracking-widest">Verify Script Permissions</p></div></div>;

            if (step === 'name') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 bg-slate-100 font-sans">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center fade-in">
                            <div className="text-blue-600 text-[10px] font-black mb-2 tracking-[0.4em] uppercase leading-none">Standard Mk 8</div>
                            <h1 className="text-2xl font-black text-slate-800 mb-8 leading-tight">{QUIZ_TITLE}</h1>
                            <input 
                                type="text" 
                                value={studentName}
                                onChange={(e) => {setStudentName(e.target.value); setAccessDenied(false);}}
                                className={`w-full p-4 bg-slate-50 border-2 rounded-2xl mb-2 text-center text-xl outline-none transition-all ${accessDenied ? 'border-red-400' : 'border-transparent focus:border-blue-500'}`}
                                placeholder="Enter Name"
                            />
                            {accessDenied && <p className="text-red-500 text-[10px] font-bold uppercase mb-4 tracking-widest">Entry Denied</p>}
                            <button onClick={startQuiz} disabled={studentName.length < 2} className="w-full mt-4 bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 disabled:opacity-50 transition-all uppercase tracking-[0.2em] text-xs">Start Quiz</button>
                        </div>
                    </div>
                );
            }

            if (step === 'done') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 text-center font-sans">
                        <div className="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full fade-in border-b-8 border-green-500">
                            <h1 className="text-2xl font-black mb-2 text-slate-800 uppercase tracking-tighter leading-none">Quiz Submitted</h1>
                            <p className="text-slate-400 text-sm font-medium mt-4">Your answers have been recorded successfully.</p>
                        </div>
                    </div>
                );
            }

            const currentQuestion = questions[currentIdx];
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-50 font-sans">
                    {showConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-6">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center fade-in">
                                <h3 className="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight">Finish Quiz?</h3>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => setShowConfirm(false)} className="w-full py-4 bg-slate-100 text-slate-500 font-bold rounded-xl uppercase text-xs tracking-widest">Review Answers</button>
                                    <button onClick={handleFinalSubmit} className="w-full py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg uppercase text-xs tracking-widest">Confirm & Submit</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl max-w-xl w-full relative fade-in">
                        <div className="flex justify-between items-center mb-8 border-b border-slate-50 pb-6">
                            <button onClick={() => currentIdx > 0 && setCurrentIdx(c => c - 1)} className={`p-2 rounded-full transition-all ${currentIdx === 0 ? 'opacity-0' : 'text-slate-300 hover:text-slate-800'}`}>
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <div className="text-slate-800 font-black text-xl leading-none tracking-tight">{currentIdx + 1} <span className="text-slate-300 text-sm">/ {questions.length}</span></div>
                            {currentIdx === questions.length - 1 ? (
                                <button onClick={() => setShowConfirm(true)} className="px-6 py-2 bg-blue-600 text-white text-[10px] font-black uppercase tracking-[0.2em] rounded-full shadow-lg">Finish</button>
                            ) : (
                                <button onClick={() => setCurrentIdx(c => c + 1)} className="p-2 text-slate-300 hover:text-slate-800 transition-all">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            )}
                        </div>
                        {currentQuestion?.imageUrl && (
                            <div className="mb-8 rounded-[2rem] overflow-hidden border-2 border-slate-50 flex justify-center bg-slate-50 shadow-inner">
                                <img src={currentQuestion.imageUrl} alt="Diagram" className="max-h-[250px] object-contain w-full" />
                            </div>
                        )}
                        <div className="mb-12 text-center">
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800 leading-snug">
                                <MathText text={currentQuestion?.q || ""} />
                            </h2>
                        </div>
                        <div className="flex flex-col gap-3">
                            {currentQuestion?.options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} className={`w-full py-5 px-6 rounded-3xl border-2 text-left font-bold text-lg transition-all ${answers[currentQuestion.id] === opt ? "bg-blue-600 border-blue-600 text-white shadow-xl" : "border-slate-50 hover:border-blue-200 text-slate-600"}`}>
                                    <div className="flex items-center gap-5">
                                        <span className={`w-8 h-8 rounded-xl flex items-center justify-center text-xs font-black ${answers[currentQuestion.id] === opt ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-400'}`}>{String.fromCharCode(65 + i)}</span>
                                        <MathText text={opt || ""} />
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
